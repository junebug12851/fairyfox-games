<!-- Header: the shared fairyfox.io masthead (brand + fixed primary nav), adopted from the
     hub's shared-chrome bundle (chrome/VERSION 2.0.0). Stories + Games live under the "Farms"
     dropdown (nav.js drives it; native <details> works with JS off). Two deliberate local
     divergences from the byte-identical bundle: (1) the Games link points at THIS site's root
     (not the hub's /games/ redirect stub) to avoid the white-flash reload; (2) this node IS the
     Games collection, so the Farms summary + Games link are always .active. The reader ("Aa")
     button is injected by assets/reader.js just after the nav. -->
<header class="site-header">
  <div class="wrap">
    <a class="brand" href="https://fairyfox.io/">
      <img class="brand-logo" src="https://fairyfox.io/assets/icons/fox.png" alt="" aria-hidden="true">
      <span class="brand-name">Fairy&nbsp;Fox</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav" aria-label="Primary">
      <a href="https://fairyfox.io/">Home</a>
      <a href="https://fairyfox.io/projects/">Projects</a>
      <!-- Farms groups the two "grown daily" collections — Stories + Games. -->
      <details class="dd">
        <summary class="active">Farms</summary>
        <div class="dd-panel">
          <div class="dd-group">
            <div class="dd-links">
              <a href="https://fairyfox.io/stories/">Stories</a>
              <a href="{{ '/' | relative_url }}" class="active">Games</a>
            </div>
          </div>
        </div>
      </details>
      <a href="https://fairyfox.io/docs/">Docs</a>
      <a href="https://fairyfox.io/blog/">Updates</a>
      <a href="https://fairyfox.io/about/">About</a>
    </nav>
  </div>
</header>

<!-- Subproject section bar. The primary nav above goes to the fairyfox.io homepage; this
     row navigates within Fairy Fox Games and names the project you're in. -->
<nav class="subnav" aria-label="Fairy Fox Games section">
  <div class="wrap">
    <a class="sub-brand" href="{{ '/' | relative_url }}">Fairy Fox Games</a>
    <a href="{{ '/' | relative_url }}"{% if page.section == 'overview' %} class="active"{% endif %}>Overview</a>
    <a href="{{ '/changelog/' | relative_url }}"{% if page.section == 'changelog' %} class="active"{% endif %}>Changelog</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="{{ '/legal/privacy/' | relative_url }}"{% if page.section == 'privacy' %} class="active"{% endif %}>Privacy</a>
    <a href="{{ '/legal/terms/' | relative_url }}"{% if page.section == 'terms' %} class="active"{% endif %}>Terms</a>
    <a href="{{ '/legal/cookies/' | relative_url }}"{% if page.section == 'cookies' %} class="active"{% endif %}>Cookies</a>
    <span class="sep" aria-hidden="true"></span>
    <a class="ext" href="https://github.com/1fairyfox/fairyfox-games">Source ↗</a>
  </div>
</nav>
