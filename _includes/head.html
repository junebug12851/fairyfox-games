<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ef6149" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191116" media="(prefers-color-scheme: dark)">

<!-- Reader ("Aa") menu: apply the saved theme / accent / text size before first paint
     (no flash). Deliberately inline — an external file would defeat the no-FOUC point.
     Versioned origin-wide key (fairyfox:reader:b), shared across every fairyfox.io site;
     kept in sync with assets/reader.js. The `r.style.background` line paints the resolved
     theme colour on <html> before styles.css loads, so a cross-document navigation never
     flashes white on the way in. -->
<script>
(function(){try{var p=JSON.parse(localStorage.getItem("fairyfox:reader:b")||"{}"),r=document.documentElement,
S=[15,16.5,18,20,22],L={tight:1.5,normal:1.65,relaxed:1.9},W={narrow:"38rem",normal:"46rem",wide:"58rem"};
if(p.theme&&p.theme!=="system")r.setAttribute("data-theme",p.theme);
r.style.background=({light:"#efe4d1",sepia:"#f1e3c2",dark:"#181017"})[(p.theme&&p.theme!=="system")?p.theme:(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark")]||"#181017";
if(p.size!=null)r.style.fontSize=S[Math.max(0,Math.min(S.length-1,p.size|0))]+"px";
if(p.lh)r.style.setProperty("--reading-lh",String(L[p.lh]||L.normal));
if(p.width)r.style.setProperty("--reading-width",W[p.width]||W.normal);
if(p.accent){var h=p.accent,ink="color-mix(in srgb, "+h+", var(--text) 42%)";
r.style.setProperty("--accent",h);r.style.setProperty("--violet",h);
r.style.setProperty("--violet-deep","color-mix(in srgb, "+h+", #000 12%)");
r.style.setProperty("--accent-ink",ink);r.style.setProperty("--link",ink);
r.style.setProperty("--link-hover","color-mix(in srgb, "+h+", var(--text) 26%)");
r.style.setProperty("--glow","color-mix(in srgb, "+h+" 40%, transparent)");}}catch(e){}})();
</script>

<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
{% if page.noindex %}<meta name="robots" content="noindex, follow">
{% endif %}
<!-- The games collection's own tab identity — the self-hosted game-farm mark (assets/icon.png).
     Note: this is the favicon only. The header brand logo (top-left) deliberately stays the shared
     fairyfox.io fox — the hub identity — see _includes/header.html. -->
<link rel="icon" type="image/png" href="{{ '/assets/icon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/icon.png' | relative_url }}">

<!-- Social-share card (Open Graph + Twitter) — the same game-farm mark. Absolute URLs so
     scrapers resolve the image off-page; portrait logo → the compact `summary` card. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:image" content="{{ '/assets/icon.png' | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta name="twitter:image" content="{{ '/assets/icon.png' | absolute_url }}">

<!-- Mesh typography — Fraunces / Inter / JetBrains Mono, self-hosted from this site's own
     origin (no Google Fonts request, so no visitor IP is sent to a third party). -->
<link rel="stylesheet" href="{{ '/assets/fonts/fonts.css' | relative_url }}">
<!-- The fairyfox.io theme (vendored from the hub design system) + focused page styles. -->
<link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
{% for s in page.styles %}<link rel="stylesheet" href="{{ '/assets/' | append: s | append: '.css' | relative_url }}">
{% endfor %}
