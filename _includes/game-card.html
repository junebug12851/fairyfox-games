<a class="card game-card proj-card" href="{{ include.game.slug | prepend: '/games/' | append: '/' | relative_url }}" data-updated="{{ include.game.updated | date: '%Y-%m-%d' }}" data-tags="{{ include.game.tags | join: ' ' }}">
  <div class="card-head">
    <img class="game-icon" src="{{ include.game.slug | prepend: '/games/' | append: '/icon.png' | relative_url }}" alt="" width="56" height="56" loading="lazy">
    <h3>{{ include.game.title }}</h3>
  </div>
  <div class="tags">{% for t in include.game.tags %}<span class="tag">{{ t }}</span>{% endfor %}</div>
  <p class="blurb">{{ include.game.tagline }}</p>
  <span class="play">▶ Play</span>
</a>
