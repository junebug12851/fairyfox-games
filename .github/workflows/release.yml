# Signed release — build provenance for each version tag.
#
# Per hub/standards/supply-chain-hardening.md #4 (Signed-Releases): on a version tag
# this packages the static site into a zip, attests keyless SLSA build provenance for
# it (satisfies the OpenSSF Scorecard Signed-Releases check), and publishes a GitHub
# Release with the artifact attached.
#
# This workflow REACTS to a tag; it does NOT create one. Tagging stays by hand
# (git-workflow.md "who creates the tag"), so pushing `vX.Y.Z` triggers this run.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # keyless signing for provenance
      attestations: write   # write the build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build the site with Jekyll
        # The same build the Pages deploy publishes — packaged here for provenance.
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Package the site
        run: |
          cd _site
          zip -r "../fairyfox-games-${GITHUB_REF_NAME}.zip" .
          cd ..

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "fairyfox-games-*.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" fairyfox-games-*.zip --title "${GITHUB_REF_NAME}" --generate-notes
