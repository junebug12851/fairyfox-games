name: Deploy to GitHub Pages

# The games are fully static (HTML + canvas + ES modules). Publish the repo as-is.
# `.nojekyll` (committed at the root) tells Pages to serve files verbatim — no Jekyll
# processing — so the games' folders and module scripts are served untouched.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read at the top level, elevate only the deploy job.
permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
