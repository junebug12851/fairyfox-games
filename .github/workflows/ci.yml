name: CI

# Run every game's test suite on pushes and PRs. Zero dependencies — just Node's
# built-in test runner, so this stays fast.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - name: Check doc links (repo-hygiene)
        run: node scripts/check-links.mjs
      - name: Run tests
        run: node --test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Jekyll build check
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
