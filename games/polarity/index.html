<!DOCTYPE html>
<html lang="en" style="background:#08080f">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08080f">
<title>Polarity</title>
<style>
  :root { --bg:#08080f; --ink:#e8e8f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:var(--bg); }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); -webkit-user-select:none; user-select:none; touch-action:none;
  }
  #wrap { position:relative; width:100vw; height:100vh; }
  canvas { display:block; width:100%; height:100%; }

  #hud {
    position:absolute; top:0; left:0; right:0; padding:18px 22px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; font-variant-numeric:tabular-nums;
  }
  .stat { line-height:1; }
  .stat .label { font-size:11px; letter-spacing:.18em; text-transform:uppercase; opacity:.45; }
  .stat .val { font-size:30px; font-weight:600; margin-top:6px; }
  #best { text-align:right; }
  #best .val { opacity:.7; }

  .panel {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    background:radial-gradient(ellipse at center, rgba(8,8,15,.55), rgba(8,8,15,.9));
    backdrop-filter:blur(2px); transition:opacity .35s ease;
  }
  .panel.hide { opacity:0; pointer-events:none; }
  .title { font-size:clamp(40px,9vw,64px); font-weight:700; letter-spacing:-.02em;
    background:linear-gradient(90deg,#35e0ff,#a98cff,#ff5cc8);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { margin-top:14px; font-size:15px; line-height:1.6; opacity:.65; max-width:360px; }
  .prompt { margin-top:30px; font-size:14px; letter-spacing:.14em; text-transform:uppercase;
    opacity:.8; animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.95} }
  @media (prefers-reduced-motion: reduce){ .prompt{ animation:none; opacity:.8 } }
  #gameover .title.record { background:linear-gradient(90deg,#7af9d0,#8ab4ff); }
  .final { margin-top:18px; font-size:18px; }
  .final b { font-size:40px; font-weight:700; display:block; margin-top:4px; }
  .newbest { color:#7af9d0; font-size:13px; letter-spacing:.16em; text-transform:uppercase; margin-top:10px; min-height:16px; }
  .clutch { color:#ffcf6a; font-size:13px; letter-spacing:.12em; text-transform:uppercase; margin-top:6px; min-height:15px; }
  .tip { margin-top:18px; font-size:12.5px; line-height:1.5; opacity:.5; max-width:320px; }
  .tip b { opacity:.85; font-weight:600; }

  /* Milestone banner — a brief celebratory flash when a score threshold is hit.
     Driven entirely by the shell (opacity + scale), purely cosmetic. */
  #milestone {
    position:absolute; left:0; right:0; top:38%; text-align:center;
    pointer-events:none; opacity:0;
    font-size:clamp(26px,6vw,44px); font-weight:700; letter-spacing:-.01em;
    background:linear-gradient(90deg,#35e0ff,#a98cff,#ff5cc8);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 24px rgba(169,140,255,.25);
  }

  /* Formation cue — a quiet, in-world name for the notable gate formation you're entering
     (Staircase, Zipper, Bursts, The Wall). The run is a *sequence* of these, so naming the
     demanding ones as they arrive makes the varied structure legible without clutter. Calm
     formations pass silently. Shell-driven opacity; fades quickly. */
  #formation {
    position:absolute; left:0; right:0; top:59%; text-align:center;
    pointer-events:none; opacity:0;
    font-size:13px; font-weight:700; letter-spacing:.3em; text-transform:uppercase;
    color:#a98cff; text-shadow:0 0 18px rgba(169,140,255,.45);
  }

  /* Stage chip — a quiet HUD readout of the run's current stage + progress toward the
     next (Growth Architecture Layer 1). Peripheral, never loud; pops on stage change. */
  #stageChip {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    pointer-events:none; transition:opacity .3s ease; color:#6ad;
  }
  #stageChip.hide { opacity:0; }
  #stageName { font-size:11px; letter-spacing:.2em; text-transform:uppercase; opacity:.9; }
  #stageBar { width:120px; height:3px; border-radius:3px; background:rgba(255,255,255,.1); overflow:hidden; }
  #stageFill { height:100%; width:0%; background:currentColor; border-radius:3px; transition:width .25s ease; }
  #stageChip.pop #stageName { animation:chipPop .5s ease; }
  @keyframes chipPop { 0%{transform:scale(1)} 30%{transform:scale(1.28)} 100%{transform:scale(1)} }
  @media (prefers-reduced-motion: reduce){ #stageChip.pop #stageName{ animation:none } #stageFill{ transition:none } }

  /* Multiplier — the star of the loop. Big + hot when the combo climbs; dim at ×1. */
  #mult {
    position:absolute; top:70px; left:50%; transform:translateX(-50%) scale(1);
    pointer-events:none; opacity:.22; font-weight:800; font-size:clamp(34px,9vw,58px);
    letter-spacing:-.02em; font-variant-numeric:tabular-nums; color:#8ab4ff;
    text-shadow:0 0 22px currentColor; transition:opacity .12s ease;
  }
  #mult.hide { opacity:0 !important; }

  /* Game-over run report (Growth Architecture Layers 2/3). */
  .stageReached { margin-top:8px; font-size:13px; letter-spacing:.1em; text-transform:uppercase; opacity:.6; min-height:15px; }
  .badges { display:flex; flex-direction:column; gap:6px; margin-top:14px; align-items:center; }
  .badge { display:flex; flex-direction:column; gap:1px; padding:6px 14px; border-radius:10px;
    background:rgba(122,249,208,.08); border:1px solid rgba(122,249,208,.22); max-width:280px; }
  .badge b { font-size:13px; color:#7af9d0; letter-spacing:.04em; }
  .badge span { font-size:11.5px; opacity:.6; }
  .metaLine { margin-top:16px; font-size:12px; letter-spacing:.06em; opacity:.45; font-variant-numeric:tabular-nums; }

  /* Coins — an OPTIONAL, cheap fun-mode extra on the menu, and a quiet "+N" when a run
     earns one. Never a gate: hidden entirely when no wallet is present, and the game plays
     identically at zero coins. Kept small + peripheral so it never competes with the game. */
  .coinrow { margin-top:22px; display:flex; flex-direction:column; align-items:center; gap:7px; pointer-events:auto; }
  .coinrow[hidden] { display:none; }
  .coinbuy {
    display:inline-flex; align-items:center; gap:.5em; padding:9px 16px; border-radius:999px; cursor:pointer;
    font:inherit; font-size:13px; font-weight:600; letter-spacing:.02em; color:#e8e8f0;
    background:rgba(169,140,255,.10); border:1px solid rgba(169,140,255,.34);
    transition:background .16s ease,border-color .16s ease,transform .16s ease,opacity .16s ease;
  }
  .coinbuy .coin-ic { display:inline-flex; width:16px; height:16px; opacity:.85; }
  .coinbuy:hover { background:rgba(169,140,255,.18); border-color:rgba(169,140,255,.5); }
  .coinbuy:disabled { cursor:default; opacity:.4; }
  .coinbuy.armed { color:#7af9d0; background:rgba(122,249,208,.12); border-color:rgba(122,249,208,.42); }
  .coinhint { font-size:11px; letter-spacing:.06em; opacity:.5; min-height:14px; }
  .coinearn { margin-top:12px; font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; color:#ffd86a; min-height:15px; }
  @media (prefers-reduced-motion: reduce){ .coinbuy{ transition:none } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="stat"><div class="label">Score</div><div class="val" id="score">0</div></div>
    <div class="stat" id="best"><div class="label">Best</div><div class="val" id="bestVal">0</div></div>
  </div>

  <div id="stageChip" class="hide">
    <div id="stageName">Drift</div>
    <div id="stageBar"><div id="stageFill"></div></div>
  </div>

  <div id="mult" class="hide">×1</div>

  <div id="milestone"></div>
  <div id="formation"></div>

  <div class="panel" id="start">
    <div class="title">Polarity</div>
    <div class="sub">Match the gate's colour to pass through. Flip at the
      <em>last instant</em> to build your multiplier.</div>
    <div class="tip">The deeper you go, the more there is to find.</div>
    <div class="coinrow" id="coinrow" hidden>
      <button type="button" class="coinbuy" id="coinBuy">
        <span class="coin-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="5.25"/></svg></span>
        <span id="coinBuyText">Disco mode · 1</span>
      </button>
      <div class="coinhint" id="coinHint"></div>
    </div>
    <div class="prompt">Click / Space to begin</div>
  </div>

  <div class="panel hide" id="gameover">
    <div class="title" id="overTitle">Polarity clash</div>
    <div class="final">Score<b id="finalScore">0</b></div>
    <div class="stageReached" id="stageReached"></div>
    <div class="newbest" id="newbest"></div>
    <div class="clutch" id="clutch"></div>
    <div class="badges" id="badges"></div>
    <div class="coinearn" id="coinEarn"></div>
    <div class="metaLine" id="metaLine"></div>
    <div class="prompt">Click or press Space to try again</div>
  </div>
</div>

<!-- Shared Fairy Fox coins wallet (vendored verbatim). Classic defer, before the module,
     so window.FairyFoxCoins exists when the shell runs. On a game page (no site header)
     it exposes the API + the first-view earn; the game draws its own coin affordance. -->
<script src="../../assets/coins.js" defer></script>

<!-- The game logic core + render shell are external modules; this is the
     conventional, robust way to load them. -->
<script type="module" src="./polarity.shell.js"></script>

<!-- Boot-failure fallback (classic script, always runs). -->
<script>
  window.addEventListener('load', function () {
    setTimeout(function () {
      if (window.__polarityBooted) return;
      var s = document.getElementById('start');
      if (!s) return;
      s.classList.remove('hide');
      s.innerHTML =
        '<div class="title" style="color:#ff9a9a">Couldn’t load</div>' +
        '<div class="sub">Polarity couldn’t load. Check your connection and reload the page.</div>';
    }, 3500);
  });
</script>
</body>
</html>
